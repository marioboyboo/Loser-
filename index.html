<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Loop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  font-size:40px;
}
</style>
</head>
<body>

<h1>Playing...</h1>

<audio id="loopAudio" autoplay loop>
  <source src="Voice 260306_162736.m4a" type="audio/mp4">
</audio>

<script>
const audio = document.getElementById("loopAudio");

function forcePlay(){
  audio.play().catch(()=>{});
}

setInterval(forcePlay, 500);
</script>

</body>
</html>
