<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:black;
  color:white;
  font-family:sans-serif;
}

button{
  font-size:28px;
  padding:20px 40px;
  border:none;
  border-radius:12px;
  background:#00ff9d;
  color:black;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

h1{
  margin-bottom:30px;
}
</style>
</head>
<body>

<h1>Audio Player</h1>

<button onclick="playAudio()">PLAY</button>

<audio id="loopAudio" loop>
  <source src="Voice 260306_162736.m4a" type="audio/mp4">
</audio>

<script>
function playAudio(){
  const audio = document.getElementById("loopAudio");
  audio.play();
}
</script>

</body>
</html>
